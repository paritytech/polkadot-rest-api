# Local development compose — uses public RPC endpoint, no local node needed
#
# Usage:
#   docker compose -f docker-compose.local.yml up -d
#
# First run requires building the API image:
#   docker compose -f docker-compose.local.yml build
#
# Then:
#   - API:        http://localhost:8080
#   - Grafana:    http://localhost:3000 (admin/admin)
#   - Prometheus: http://localhost:9090

services:
  rest-api:
    container_name: rest-api
    build: .
    read_only: true
    restart: on-failure
    ports:
      - "8080:8080"
    environment:
      SAS_SUBSTRATE_MULTI_CHAIN_URL: '[{"url":"wss://rpc.polkadot.io","type":"relay"}]'
      SAS_SUBSTRATE_URL: wss://asset-hub-polkadot.dotters.network
      SAS_METRICS_ENABLED: "true"

  process-exporter:
    container_name: process-exporter
    image: ncabatoff/process-exporter:latest
    pid: host
    privileged: true
    volumes:
      - /proc:/host/proc:ro
      - ./metrics/process-exporter.yml:/config/process-exporter.yml:ro
    command:
      - "--procfs=/host/proc"
      - "-config.path=/config/process-exporter.yml"
    ports:
      - "9256:9256"

  prometheus:
    container_name: prometheus
    image: prom/prometheus:latest
    volumes:
      - ./metrics/prometheus-docker.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      - rest-api
      - process-exporter

  grafana:
    container_name: grafana
    image: grafana/grafana:latest
    volumes:
      - ./metrics/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      - prometheus
